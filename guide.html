<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>32:9 / 16:9 가이드라인 미리보기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #fff; font-family: sans-serif; overflow: auto; }
        .preview { position: relative; margin: 20px auto; border: 2px solid #333; }
        .preview iframe { display: block; border: none; transform-origin: top left; }
        .label { position: absolute; top: -30px; left: 0; font-size: 14px; color: #aaa; }
        .guide-box { position: absolute; border: 2px dashed; pointer-events: none; top: 0; }
        h2 { text-align: center; margin: 30px 0 10px; color: #ccc; font-size: 16px; }
        .note { text-align: center; color: #888; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>그로잉홀 32:9 (7680×2160 → 축소 미리보기)</h2>
    <p class="note">실제 해상도 7680×2160을 1/8 스케일로 표시</p>
    <div class="preview" style="width: 960px; height: 270px; overflow: hidden;">
        <span class="label">32:9 (960×270 = 7680×2160 / 8)</span>
        <iframe src="index-v4.html" width="7680" height="2160" style="transform: scale(0.125); width: 7680px; height: 2160px;"></iframe>
    </div>

    <h2>전자칠판 16:9 (3840×2160 영역)</h2>
    <p class="note">32:9 화면의 가운데 절반이 16:9 영역입니다</p>
    <div class="preview" style="width: 960px; height: 270px; overflow: hidden;">
        <span class="label">32:9 전체 + 16:9 가이드(빨간 점선)</span>
        <iframe src="index-v4.html" width="7680" height="2160" style="transform: scale(0.125); width: 7680px; height: 2160px;"></iframe>
        <!-- 16:9 가이드: 가운데 3840px = 480px(축소) -->
        <div class="guide-box" style="border-color: #ff3366; left: 240px; width: 480px; height: 270px;">
            <span style="position:absolute; top:4px; left:4px; font-size:12px; color:#ff3366;">16:9 영역</span>
        </div>
    </div>
</body>
</html>
